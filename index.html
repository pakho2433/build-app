<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="私人記錄">
  <title>我的私人記錄</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <script src="./app.js" defer></script>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans HK",sans-serif;color:#111827;background:#f3f4f6;color-scheme:light}*{box-sizing:border-box}body{margin:0;min-height:100vh}.hidden{display:none!important}button,input,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:12px;padding:12px 16px;font-weight:700}.primary{background:#111827;color:#fff}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}.ghost{background:transparent;color:#374151;padding:8px}.shell{max-width:900px;margin:auto;padding:calc(16px + env(safe-area-inset-top)) 16px calc(28px + env(safe-area-inset-bottom))}.card{background:#fff;border-radius:20px;padding:18px;box-shadow:0 8px 30px rgba(17,24,39,.08);margin-bottom:16px}h1,h2,h3,p{margin-top:0}.muted{color:#6b7280}.small{font-size:.86rem}.row{display:flex;gap:10px;align-items:center}.wrap{flex-wrap:wrap}.between{justify-content:space-between}.grow{flex:1}input,textarea{width:100%;border:1px solid #d1d5db;border-radius:12px;padding:12px;background:#fff;color:#111827}textarea{min-height:150px;resize:vertical}label{display:block;font-weight:700;margin:12px 0 6px}.auth{max-width:460px;margin:8vh auto}.notice{background:#ecfdf5;color:#065f46;border-radius:14px;padding:12px;margin-bottom:14px}.topbar{position:sticky;top:0;z-index:5;background:rgba(243,244,246,.92);backdrop-filter:blur(12px);padding:8px 0 12px}.note{border:1px solid #e5e7eb;border-radius:16px;padding:14px;margin-top:10px;background:#fff}.note h3{margin-bottom:5px}.note-text{white-space:pre-wrap;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}.tag{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 9px;font-size:.78rem;margin-right:6px}.empty{text-align:center;padding:34px 12px;color:#6b7280}dialog{border:0;border-radius:20px;width:min(92vw,650px);padding:0;box-shadow:0 24px 70px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(17,24,39,.55)}.dialog-inner{padding:18px}.file-label{display:inline-block;background:#e5e7eb;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}.file-label input{display:none}#status{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:10px 15px;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.2)}@media(max-width:600px){.row.mobile-stack{align-items:stretch;flex-direction:column}.row.mobile-stack button{width:100%}}
  </style>
</head>
<body>
<main class="shell">
  <section id="setupView" class="auth hidden"><div class="card">
    <h1>建立私人記錄庫</h1><div class="notice">資料只會加密儲存在呢部裝置，不會上傳 GitHub 或其他伺服器。</div><p class="muted">請設定私人密碼。忘記密碼後無法復原，所以請自行記低。</p>
    <form id="setupForm"><label for="newPassword">私人密碼</label><input id="newPassword" type="password" minlength="6" autocomplete="new-password" required><label for="confirmPassword">再次輸入</label><input id="confirmPassword" type="password" minlength="6" autocomplete="new-password" required><button class="primary" style="width:100%;margin-top:16px">建立記錄庫</button></form>
  </div></section>

  <section id="unlockView" class="auth hidden"><div class="card">
    <h1>🔒 我的私人記錄</h1><p class="muted">輸入密碼解鎖。資料只儲存在目前瀏覽器。</p>
    <form id="unlockForm"><label for="unlockPassword">私人密碼</label><input id="unlockPassword" type="password" autocomplete="current-password" required><button class="primary" style="width:100%;margin-top:16px">解鎖</button></form>
  </div></section>

  <section id="appView" class="hidden">
    <div class="topbar"><div class="row between"><div><h1 style="margin:0">我的私人記錄</h1><div class="muted small">本機加密・不上傳雲端</div></div><button id="lockBtn" class="secondary">鎖定</button></div></div>
    <div class="card"><div class="row mobile-stack"><input id="searchInput" class="grow" type="search" placeholder="搜尋標題、分類或內容"><button id="newBtn" class="primary">＋ 新增記錄</button></div></div>
    <div class="card"><div class="row between wrap"><div><strong id="recordCount">0 項記錄</strong><div class="muted small">每次儲存後會立即加密</div></div><div class="row wrap"><button id="exportBtn" class="secondary">匯出加密備份</button><label class="file-label">匯入備份<input id="importInput" type="file" accept="application/json,.json"></label><button id="resetBtn" class="danger">清除全部</button></div></div></div>
    <div id="notesList"></div>
  </section>
</main>

<dialog id="editorDialog"><form id="editorForm" class="dialog-inner">
  <div class="row between"><h2 id="editorHeading">新增記錄</h2><button type="button" id="closeEditor" class="ghost">✕</button></div><input id="editId" type="hidden">
  <label for="noteDate">日期</label><input id="noteDate" type="date" required><label for="noteTitle">標題</label><input id="noteTitle" maxlength="120" required placeholder="例如：今日待辦／健身紀錄"><label for="noteCategory">分類</label><input id="noteCategory" maxlength="40" placeholder="例如：生活、健身、工作"><label for="noteContent">內容</label><textarea id="noteContent" required placeholder="輸入你想保存嘅內容……"></textarea>
  <div class="row mobile-stack" style="margin-top:16px"><button type="button" id="cancelEditor" class="secondary grow">取消</button><button class="primary grow">儲存並加密</button></div>
</form></dialog>
<div id="status" class="hidden" role="status"></div>
</body>
</html>
